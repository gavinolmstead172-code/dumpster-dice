<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dumpster Dice Multiplayer</title>
    
    <script src="/socket.io/socket.io.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .screen {
            display: none;
            max-width: 450px;
            margin: 60px auto;
            padding: 30px;
            background: #1e1e1e;
            border-radius: 14px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.7);
            border: 1px solid #2d2d2d;
        }
        .active {
            display: block; /* This makes the current screen visible */
        }
        h1 {
            color: #4CAF50;
            margin-bottom: 20px;
        }
        input, button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            box-sizing: border-box;
        }
        input {
            background: #2d2d2d;
            color: #ffffff;
            border: 1px solid #444;
        }
        button {
            background: #4CAF50;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        button:hover {
            background: #45a049;
            transform: translateY(-1px);
        }
        button:active {
            transform: translateY(1px);
        }
        .menu-btn {
            background: #2a2a2a;
            color: #ffffff;
            border: 1px solid #3a3a3a;
            text-align: left;
            padding-left: 20px;
        }
        .menu-btn:hover {
            background: #333333;
            border-color: #4CAF50;
        }
        .dice-container {
            font-size: 64px;
            margin: 30px 0;
            min-height: 80px;
            transition: transform 0.2s;
        }
        #log {
            background: #0b0b0b;
            padding: 12px;
            border-radius: 8px;
            text-align: left;
            height: 120px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            color: #00ff66;
            border: 1px solid #222;
        }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <h1>🗑️ Dumpster Dice</h1>
        <p style="color: #aaa;">Enter a username to join the server</p>
        <input type="text" id="username-input" placeholder="Enter Username..." autocomplete="off" maxlength="15">
        <button id="join-btn">Sign In & Connect</button>
    </div>

    <div id="menu-screen" class="screen">
        <h1>Dumpster Dice</h1>
        <p style="color: #aaa;">Welcome, <span id="player-name" style="color:#4CAF50; font-weight:bold;"></span>!</p>
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        
        <button class="menu-btn" onclick="selectMode('Basic Game')">1. Basic Game</button>
        <button class="menu-btn" onclick="selectMode('Tidy Trash')">2. Tidy Trash</button>
        <button class="menu-btn" onclick="selectMode('Dump & Dash')">3. Dump & Dash</button>
        <button class="menu-btn" onclick="selectMode('Bin Battle')">4. Bin Battle</button>
        <button class="menu-btn" onclick="selectMode('Waste War')">5. Waste War</button>
    </div>

    <div id="game-screen" class="screen">
        <h2 id="current-mode-title" style="color: #4CAF50;">Match Room</h2>
        
        <div class="dice-container" id="dice-display">🎲</div>
        
        <button id="roll-btn">Roll Dice</button>
        <button class="menu-btn" onclick="backToMenu()" style="margin-top:20px; background:#aa3333; text-align:center; padding-left:0;">Leave Match</button>
        
        <h3 style="text-align: left; margin-bottom: 5px; font-size: 14px; color: #888;">Live Activity Log:</h3>
        <div id="log"></div>
    </div>

    <script>
        // Connects to Render network
        const socket = io();

        const loginScreen = document.getElementById('login-screen');
        const menuScreen = document.getElementById('menu-screen');
        const gameScreen = document.getElementById('game-screen');
        
        const usernameInput = document.getElementById('username-input');
        const joinBtn = document.getElementById('join-btn');
        const playerNameSpan = document.getElementById('player-name');
        const currentModeTitle = document.getElementById('current-mode-title');
        const rollBtn = document.getElementById('roll-btn');
        const diceDisplay = document.getElementById('dice-display');
        const logDiv = document.getElementById('log');

        let currentUsername = "";

        // Sign In
        joinBtn.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            if (username === "") {
                alert("Please enter a username to sign in!");
                return;
            }
            
            currentUsername = username;
            playerNameSpan.textContent = currentUsername;

            socket.emit('playerLogin', { username: currentUsername });

            // Swap to menu
            changeScreen(menuScreen);
            addLog("Successfully connected to the server.");
        });

        // Menu Navigation
        function selectMode(modeName) {
            currentModeTitle.textContent = modeName;
            socket.emit('joinMode', { mode: modeName });
            changeScreen(gameScreen);
            addLog(`Entered match lobby for [${modeName}]`);
        }

        function backToMenu() {
            socket.emit('leaveMode');
            changeScreen(menuScreen);
            diceDisplay.textContent = "🎲";
        }

        // Rolling Action
        rollBtn.addEventListener('click', () => {
            socket.emit('requestRoll');
        });

        socket.on('connect', () => {
            console.log("Connected to server!");
        });

        socket.on('rollResult', (data) => {
            diceDisplay.textContent = "🎲 " + data.roll;
            
            diceDisplay.style.transform = "scale(1.2)";
            setTimeout(() => { diceDisplay.style.transform = "scale(1)"; }, 150);
            
            const displayingIdentity = data.playerID ? data.playerID.substring(0, 5) : "Player";
            addLog(`User [${displayingIdentity}] rolled a: ${data.roll}`);
        });

        // FIXED Helper Function
        function changeScreen(targetView) {
            loginScreen.classList.remove('active');
            menuScreen.classList.remove('active');
            gameScreen.classList.remove('active');
            targetView.classList.add('active'); // Fixed this line!
        }

        function addLog(textString) {
            const logEntry = document.createElement('p');
            logEntry.style.margin = "5px 0";
            logEntry.textContent = `> ${textString}`;
            logDiv.appendChild(logEntry);
            logDiv.scrollTop = logDiv.scrollHeight; 
        }
    </script>
</body>
</html>
